name: Dependency Autopilot
# Thin caller — all logic lives in StartupBros-com/shared-workflows.
# Fires when this repo's CI finishes on a Dependabot PR: green -> auto-merge,
# red -> Codex auto-fix (where creds are available).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
permissions:
  contents: write
  pull-requests: write
  actions: read
jobs:
  autopilot:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    uses: StartupBros-com/shared-workflows/.github/workflows/dependency-autopilot.yml@9c575d5d80cf93f124190b122d037835244c8448 # feat: parametrize runner
    with:
      # runner intentionally left unset (defaults to ubuntu-latest): this is a
      # public repo, GitHub-hosted runners are free/unmetered and fork-safe here.
      ci_conclusion: ${{ github.event.workflow_run.conclusion }}
      pr_branch:     ${{ github.event.workflow_run.head_branch }}
      ci_run_id:     ${{ github.event.workflow_run.id }}
      ecosystem:     pnpm
      mode:          automerge
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
